# Grafana Agent configuration for CoDarling monitoring
#
# Prerequisites:
#   Install Grafana Agent (no Docker needed):
#   https://grafana.com/docs/agent/latest/static/set-up/install/
#
# Run:
#   export SUPABASE_PROJECT_REF=ecdshhuvypmgxalpriab
#   export METRICS_SECRET=<값은 .dart_define.json의 METRICS_SECRET 참조>
#   export PROMETHEUS_URL=https://prometheus-prod-XX-prod-XX.grafana.net/api/prom/push
#   export PROMETHEUS_USER=<grafana_cloud_instance_id>
#   export PROMETHEUS_PASSWORD=<grafana_cloud_api_key>
#   grafana-agent --config.file=./monitoring/grafana-agent.yaml

server:
  log_level: info

metrics:
  wal_directory: /tmp/grafana-agent-wal

  global:
    scrape_interval: 60s
    evaluation_interval: 60s
    external_labels:
      app: codarling
      env: production

  configs:
    - name: codarling

      scrape_configs:
        - job_name: codarling-metrics
          scheme: https
          metrics_path: /functions/v1/metrics
          scrape_interval: 60s
          scrape_timeout: 30s

          static_configs:
            - targets:
                - "${SUPABASE_PROJECT_REF}.supabase.co"

          authorization:
            type: Bearer
            credentials: "${METRICS_SECRET}"

      remote_write:
        - url: "${PROMETHEUS_URL}"
          basic_auth:
            username: "${PROMETHEUS_USER}"
            password: "${PROMETHEUS_PASSWORD}"
          queue_config:
            max_samples_per_send: 500
            batch_send_deadline: 5s
