workflows:
  ios-release:
    name: iOS Release → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.29.3
      xcode: latest
      cocoapods: default
      # Variable groups must be created in Codemagic → Team → Global variables and secrets:
      #   app_store_connect : APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID,
      #                       APP_STORE_CONNECT_PRIVATE_KEY, APPLE_TEAM_ID
      #   firebase_ios      : GOOGLE_SERVICE_INFO_PLIST (base64-encoded plist)
      #   dart_define       : SUPABASE_URL, SUPABASE_ANON_KEY, DEV_TEST_PASSWORD
      groups:
        - app_store_connect
        - firebase_ios
        - dart_define
      vars:
        BUNDLE_ID: com.codarling.codarling
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        # Set APPLE_TEAM_ID in Codemagic environment or app_store_connect group
        # Find it at: https://developer.apple.com/account → Membership → Team ID

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist

      - name: Flutter pub get
        script: flutter pub get

      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/auth_key.p8
          # Use stable certificate key stored in environment variable
          printf '%s' "$CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key.pem
          # fetch-signing-files handles both certificate creation and provisioning profile
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "@file:/tmp/cert_key.pem" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@file:/tmp/auth_key.p8"
          keychain add-certificates
          xcode-project use-profiles

      - name: Flutter build iOS
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-number=$BUILD_NUMBER \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=DEV_TEST_PASSWORD=$DEV_TEST_PASSWORD

      - name: Package IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
