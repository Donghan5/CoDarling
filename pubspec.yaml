name: codarling
description: "A couple's daily photo diary app for long-distance relationships."
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Error handling
  dartz: ^0.10.1

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Push notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  mockito: ^5.4.5
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/CoDarling_app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/CoDarling_app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/CoDarling_loading_image.png"
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center

flutter:
  uses-material-design: true

  assets:
    - assets/images/
