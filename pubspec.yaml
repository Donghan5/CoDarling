name: codarling
description: "A couple's daily photo diary app for long-distance relationships."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Error handling
  dartz: ^0.10.1

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  mockito: ^5.4.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
